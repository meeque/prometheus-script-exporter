scripts:
  - name: 'success'
    script: exit 0

  - name: 'failure'
    script: exit 1

  - name: 'timeout'
    script: sleep 3
    timeout: 1

  - name: 'number'
    script: echo 23
    output: number

  - name: 'json'
    script: |
      echo '{"foo": 42, "bar": 2.71828}'
    output: json

  - name: 'mixed-json'
    script: |
      echo '{"text": "foo", "number": 7, "boolean": true, "array": [true, 2, "3"], "empty": [], "nested": {"null": null, "boolean": false, "pi": "3.14", "empty": []}}'
    output: json
